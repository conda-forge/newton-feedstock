schema_version: 1

context:
  name: newton
  version: "1.1.0"
  build_number: 0

recipe:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://github.com/newton-physics/newton/archive/refs/tags/v${{ version }}.zip
  sha256: 8ce9d98b31fb730d5019f1ea99109c16b21f5ece0ed8a86bdded3ed595ef6430

build:
  noarch: python
  number: ${{ build_number }}

# https://github.com/newton-physics/newton/blob/main/pyproject.toml
outputs:
  # ======
  # newton
  # ======
  - package:
      name: newton
    build:
      script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
    requirements:
      host:
        - python ${{ python_min }}.*
        - pip
        - uv-build >=0.11.0
      run:
        - python >=${{ python_min }}
        - warp-lang >=1.12.0
  # ===========
  # newton[all]
  # ===========
  - package:
      name: newton-all
    requirements:
      host:
        - python ${{ python_min }}.*
      # Any modifications to the subpackages pin should be propagated also
      # to the newton[examples] run dependencies.
      # We cannot use `newton-all` because it would be a dependency cycle.
      run:
        - python >=${{ python_min }}
        - ${{ pin_subpackage('newton', exact=True) }}
        - ${{ pin_subpackage('newton-sim', exact=True) }}
        - ${{ pin_subpackage('newton-importers', exact=True) }}
        - ${{ pin_subpackage('newton-remesh', exact=True) }}
        - ${{ pin_subpackage('newton-examples', exact=True) }}
        - ${{ pin_subpackage('newton-notebook', exact=True) }}
    tests:
      - python:
          imports:
            - newton
          pip_check: true
          # There are deps solver problems on Python 3.10, and the environment cannot be solved.
          # Testing imports on Python 3.11 until those problems are resolved.
          python_version: 3.11.*
      - script:
          - python -m newton.tests
        requirements:
          run:
            - python 3.11.*
  # ===========
  # newton[sim]
  # ===========
  - package:
      name: newton-sim
    requirements:
      host:
        - python ${{ python_min }}.*
      run:
        - ${{ pin_subpackage('newton', exact=True) }}
        - python >=${{ python_min }}
        - mujoco-warp >=3.6.0
        - mujoco >=3.6.0
        - newton-actuators >=0.1.0
  # =================
  # newton[importers]
  # =================
  - package:
      name: newton-importers
    requirements:
      host:
        - python ${{ python_min }}.*
      run:
        - ${{ pin_subpackage('newton', exact=True) }}
        - python >=${{ python_min }}
        - requests >=2.25.0
        - scipy >=1.11.0
        - fast-simplification >=0.1.11
        - alphashape >=1.3.1
        - coacd >=1.0.7
        - trimesh >=4.6.8
        - meshio >=5.3.0
        - pycollada >=0.9
        - resolve-robotics-uri-py >=0.4.0
        - open3d >=0.18.0
        - openusd >=25.5
        - usd-exchange >=2.2.0
        - newton-usd-schemas >=0.1.0
        # Fix missing open3d-cpu dependencies (for pip check).
        # https://github.com/conda-forge/open3d-feedstock/issues/49
        - configargparse
        - nbformat
  # ==============
  # newton[remesh]
  # ==============
  - package:
      name: newton-remesh
    requirements:
      host:
        - python ${{ python_min }}.*
      run:
        - ${{ pin_subpackage('newton', exact=True) }}
        - python >=${{ python_min }}
        - open3d >=0.18.0
        - pyfqmr >=0.5.0
        # Fix missing open3d-cpu dependencies (for pip check).
        # https://github.com/conda-forge/open3d-feedstock/issues/49
        - configargparse
        - nbformat
  # ================
  # newton[examples]
  # ================
  - package:
      name: newton-examples
    requirements:
      host:
        - python ${{ python_min }}.*
      run:
        - ${{ pin_subpackage('newton', exact=True) }}
        - ${{ pin_subpackage('newton-sim', exact=True) }}
        - ${{ pin_subpackage('newton-importers', exact=True) }}
        - python >=${{ python_min }}
        - pyglet >=2.1.6,<3
        - gitpython >=3.1.44
        - imgui-bundle >=1.92.0
        - pyyaml >=6.0.2
        - cbor2 >=5.7.0,<6
        - pillow >= 9.0.0
        # Additional deps to run examples.
        - importlib_resources
      run_constraints:
        - pytorch >=2.7.0
  # ================
  # newton[notebook]
  # ================
  - package:
      name: newton-notebook
    requirements:
      host:
        - python ${{ python_min }}.*
      run:
        - ${{ pin_subpackage('newton', exact=True) }}
        - ${{ pin_subpackage('newton-examples', exact=True) }}
        - python >=${{ python_min }}
        - rerun-sdk >=0.27.1
        - jupyterlab >=4.4.10
        # Fix missing rerun-notebook dependencies (for pip check).
        - ipykernel <7

about:
  homepage: https://newton-physics.github.io/newton/
  license: Apache-2.0
  license_file: LICENSE.md
  repository: https://github.com/newton-physics/newton
  summary: An open-source, GPU-accelerated physics simulation engine built upon NVIDIA Warp, specifically targeting roboticists and simulation researchers.

extra:
  feedstock-name: newton
  recipe-maintainers:
    - adenzler-nvidia
    - diegoferigo
    - eric-heiden
